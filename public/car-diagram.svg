<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 460" fill="none">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4dce8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#b8c5d6" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- CENTER: CAR BODY TOP VIEW -->
  <g stroke="#b0b0b0" stroke-width="1" fill="#e8e8e8">
    <!-- Body outline -->
    <path d="M210,30 Q215,18 250,15 Q285,18 290,30 L295,55 L300,75 L305,110 L308,140 L310,175 L310,290 L308,330 L305,360 L300,390 L295,410 Q290,435 250,440 Q210,435 205,410 L200,390 L195,360 L192,330 L190,290 L190,175 L192,140 L195,110 L200,75 L205,55 Z" fill="#e8e8e8"/>

    <!-- Front bumper -->
    <path d="M215,32 Q220,20 250,17 Q280,20 285,32 L288,48 L212,48 Z" fill="#dedede"/>

    <!-- Hood -->
    <path d="M212,48 L288,48 L295,75 L300,120 L200,120 L205,75 Z" fill="#e8e8e8"/>
    <line x1="250" y1="52" x2="250" y2="115" stroke="#c8c8c8" stroke-width="0.5"/>

    <!-- Fenders -->
    <path d="M195,50 L212,48 L205,75 L200,120 L190,120 L188,85 Z" fill="#e0e0e0"/>
    <path d="M288,48 L305,50 L312,85 L310,120 L300,120 L295,75 Z" fill="#e0e0e0"/>

    <!-- Front windshield -->
    <path d="M200,120 L300,120 L305,165 L195,165 Z" fill="url(#glass)"/>

    <!-- A-pillars -->
    <rect x="188" y="120" width="7" height="45" rx="2" fill="#d0d0d0"/>
    <rect x="305" y="120" width="7" height="45" rx="2" fill="#d0d0d0"/>

    <!-- Roof -->
    <path d="M195,165 L305,165 L305,310 L195,310 Z" fill="#ececec"/>
    <rect x="218" y="192" width="64" height="85" rx="5" fill="none" stroke="#d5d5d5" stroke-width="0.5" stroke-dasharray="3,3"/>

    <!-- Sills -->
    <rect x="184" y="165" width="4" height="160" fill="#d8d8d8"/>
    <rect x="312" y="165" width="4" height="160" fill="#d8d8d8"/>

    <!-- B-pillars -->
    <rect x="188" y="235" width="7" height="22" rx="2" fill="#c8c8c8"/>
    <rect x="305" y="235" width="7" height="22" rx="2" fill="#c8c8c8"/>

    <!-- C-pillars -->
    <rect x="188" y="310" width="7" height="25" rx="2" fill="#c8c8c8"/>
    <rect x="305" y="310" width="7" height="25" rx="2" fill="#c8c8c8"/>

    <!-- Quarter panels -->
    <path d="M188,335 L195,310 L195,365 L192,365 Z" fill="#e0e0e0"/>
    <path d="M305,310 L312,335 L308,365 L305,365 Z" fill="#e0e0e0"/>

    <!-- Rear windshield -->
    <path d="M195,310 L305,310 L300,348 L200,348 Z" fill="url(#glass)"/>

    <!-- Trunk -->
    <path d="M200,348 L300,348 L295,395 L205,395 Z" fill="#e8e8e8"/>
    <line x1="250" y1="352" x2="250" y2="390" stroke="#c8c8c8" stroke-width="0.5"/>

    <!-- Rear bumper -->
    <path d="M205,395 L295,395 Q290,425 250,430 Q210,425 205,395 Z" fill="#dedede"/>
  </g>

  <!-- Headlights -->
  <ellipse cx="222" cy="35" rx="8" ry="6" fill="#f5edc7" stroke="#c0c0c0" stroke-width="0.5"/>
  <ellipse cx="278" cy="35" rx="8" ry="6" fill="#f5edc7" stroke="#c0c0c0" stroke-width="0.5"/>

  <!-- Taillights -->
  <ellipse cx="215" cy="400" rx="8" ry="5" fill="#e8b0b0" stroke="#c0c0c0" stroke-width="0.5"/>
  <ellipse cx="285" cy="400" rx="8" ry="5" fill="#e8b0b0" stroke="#c0c0c0" stroke-width="0.5"/>

  <!-- Wheels -->
  <ellipse cx="180" cy="95" rx="12" ry="22" fill="#555" opacity="0.5"/>
  <ellipse cx="180" cy="95" rx="6" ry="12" fill="#777" opacity="0.4"/>
  <ellipse cx="320" cy="95" rx="12" ry="22" fill="#555" opacity="0.5"/>
  <ellipse cx="320" cy="95" rx="6" ry="12" fill="#777" opacity="0.4"/>
  <ellipse cx="180" cy="355" rx="12" ry="22" fill="#555" opacity="0.5"/>
  <ellipse cx="180" cy="355" rx="6" ry="12" fill="#777" opacity="0.4"/>
  <ellipse cx="320" cy="355" rx="12" ry="22" fill="#555" opacity="0.5"/>
  <ellipse cx="320" cy="355" rx="6" ry="12" fill="#777" opacity="0.4"/>

  <!-- Side mirrors -->
  <ellipse cx="178" cy="140" rx="8" ry="5" fill="#d5d5d5" stroke="#b0b0b0" stroke-width="0.5"/>
  <ellipse cx="322" cy="140" rx="8" ry="5" fill="#d5d5d5" stroke="#b0b0b0" stroke-width="0.5"/>

  <!-- LEFT DOORS (opened outward) -->
  <g stroke="#b0b0b0" stroke-width="0.8">
    <!-- Hinge lines -->
    <line x1="130" y1="160" x2="184" y2="168" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="130" y1="260" x2="184" y2="258" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2,2"/>

    <!-- Front door -->
    <path d="M35,115 L130,130 L130,230 L35,245 Z" fill="#efefef" stroke="#b0b0b0"/>
    <path d="M45,125 L122,138 L122,178 L45,168 Z" fill="url(#glass)"/>
    <rect x="60" y="195" width="18" height="3" rx="1.5" fill="#aaa"/>
    <line x1="38" y1="180" x2="128" y2="184" stroke="#ccc" stroke-width="0.4"/>

    <!-- Rear door -->
    <path d="M35,255 L130,240 L130,340 L35,355 Z" fill="#efefef" stroke="#b0b0b0"/>
    <path d="M45,263 L122,250 L122,290 L45,300 Z" fill="url(#glass)"/>
    <rect x="60" y="310" width="18" height="3" rx="1.5" fill="#aaa"/>
    <line x1="38" y1="308" x2="128" y2="298" stroke="#ccc" stroke-width="0.4"/>
  </g>

  <!-- RIGHT DOORS (opened outward) -->
  <g stroke="#b0b0b0" stroke-width="0.8">
    <line x1="370" y1="160" x2="316" y2="168" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="370" y1="260" x2="316" y2="258" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2,2"/>

    <path d="M465,115 L370,130 L370,230 L465,245 Z" fill="#efefef" stroke="#b0b0b0"/>
    <path d="M455,125 L378,138 L378,178 L455,168 Z" fill="url(#glass)"/>
    <rect x="420" y="195" width="18" height="3" rx="1.5" fill="#aaa"/>
    <line x1="462" y1="180" x2="372" y2="184" stroke="#ccc" stroke-width="0.4"/>

    <path d="M465,255 L370,240 L370,340 L465,355 Z" fill="#efefef" stroke="#b0b0b0"/>
    <path d="M455,263 L378,250 L378,290 L455,300 Z" fill="url(#glass)"/>
    <rect x="420" y="310" width="18" height="3" rx="1.5" fill="#aaa"/>
    <line x1="462" y1="308" x2="372" y2="298" stroke="#ccc" stroke-width="0.4"/>
  </g>
</svg>
